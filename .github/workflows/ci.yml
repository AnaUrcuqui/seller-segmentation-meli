name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Calidad de código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python
        run: uv python install 3.11

      - name: Instalar dependencias
        run: uv sync --group dev

      - name: Lint con ruff
        run: uv run ruff check src/ tests/

      - name: Verificar formato
        run: uv run ruff format --check src/ tests/

      - name: Verificación de tipos
        run: uv run mypy src/

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python
        run: uv python install 3.11

      - name: Instalar dependencias
        run: uv sync --group dev

      - name: Ejecutar tests
        run: uv run pytest tests/ -v

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura
          path: htmlcov/

  notebooks:
    name: Validación de notebooks
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python
        run: uv python install 3.11

      - name: Instalar dependencias
        run: uv sync --group dev

      - name: Validar estructura de notebooks
        run: uv run python scripts/validate_notebooks.py
